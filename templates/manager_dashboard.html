{% extends "base.html" %}
{% block content %}
<div class="text-start mb-4">
    <h3 class="fw-bold mb-1">Team Overview</h3>
    <p class="text-muted">You are managing {{ users|length }} members</p>
</div>

<div class="row g-4 text-start">
    {% for user in users %}
    <div class="col-md-6">
        <div class="card p-3 h-100">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h6 class="mb-0 fw-bold">{{ user.username }}</h6>
                    <small class="text-muted">{{ user.email }}</small>
                </div>
                <span class="badge rounded-pill bg-primary px-3" style="font-size: 10px;">{{ user.role }}</span>
            </div>
            <div class="mt-3 pt-3 border-top d-flex gap-2">
                <a href="{% url 'edit_user' user.id %}" class="btn btn-sm btn-outline-primary w-100">Edit</a>
                <form method="POST" action="{% url 'delete_user' user.id %}" class="w-100">
                    {% csrf_token %}
                    <button class="btn btn-sm btn-outline-danger w-100">Remove</button>
                </form>
            </div>
        </div>
    </div>
    {% empty %}
    <div class="col-12 text-center py-5">
        <p class="text-muted">No team members assigned to you yet.</p>
    </div>
    {% endfor %}
</div>

<div class="text-center mt-5">
    <a href="{% url 'logout' %}" class="text-muted small">Sign Out</a>
</div>
{% endblock %}
